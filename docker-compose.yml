name: docmind
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: docmind-qdrant
    ports:
      - "6333:6333" #RestAPi and Dashboard
      - "6334:6334" #grpc
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: docmind-redis
    ports:
      - "6379-6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: docmind-postgres
    environment:
      POSTGRES_USER: docmind
      POSTGRES_PASSWORD: docmind
      POSTGRES_DB: docmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgressql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
